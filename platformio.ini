; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
; PlatformIO Project Configuration File
[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = espidf
; Currently using ESP-IDF v5.4.0 (package version 3.50400.0)
; To specify a different version, uncomment one of the following lines:
; platform_packages = framework-espidf@3.50500.0  ; ESP-IDF v5.5.0
; platform_packages = framework-espidf@3.50400.0  ; ESP-IDF v5.4.0 (current)
; platform_packages = framework-espidf@3.50102.240122  ; ESP-IDF v5.1.2
build_flags =
    -DIDF_VERSION_MAJOR=5  ; Enable ESP-IDF v5.x specific code if needed
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = partitions.csv
board_build.filesystem = spiffs
extra_scripts = post:firmware/copy_firmware.py
; ESP-IDF Version Information:
; - Current version: 5.4.0 (PlatformIO package 3.50400.0)
; - Latest available: 5.5.0 (PlatformIO package 3.50500.0)
; 
; To check which version is being used in your build:
;   pio run -e esp32doit-devkit-v1 -v | grep "framework-espidf"
; 
; To check the version file:
;   cat ~/.platformio/packages/framework-espidf@VERSION/version.txt
; 
; Note for Apple Silicon (M1/M2/M3) Mac users:
; - If you encounter compatibility issues when explicitly pinning versions,
;   remove the platform_packages line to let PlatformIO choose a compatible version.

